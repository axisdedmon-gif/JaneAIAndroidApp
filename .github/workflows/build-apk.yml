name: Build Jane Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Unpack clean Jane package
        run: |
          rm -rf source unpacked
          mkdir -p unpacked

          if [ -f JaneAIAndroidSource_clean_v50_model_b_no_removed_remnants.zip ]; then
            unzip JaneAIAndroidSource_clean_v50_model_b_no_removed_remnants.zip -d source
          elif [ -f JaneCleanV50ModelBNoRemovedRemnantsPackage.zip ]; then
            unzip JaneCleanV50ModelBNoRemovedRemnantsPackage.zip -d unpacked
            unzip unpacked/JaneAIAndroidSource_clean_v50_model_b_no_removed_remnants.zip -d source
          else
            echo "Package missing."
            ls -la
            exit 1
          fi

      - name: Verify clean rebuild
        working-directory: source
        run: |
          echo "=== GLB verification ==="
          find app/src/main/assets -name "*.glb" -print
          test "$(find app/src/main/assets -name "*.glb" | wc -l)" -eq 1
          test -f "app/src/main/assets/Jane_3D_Mobile_APK_Model_B.glb"
          grep -q "Jane 3D Mobile APK Model B" app/src/main/assets/index.html
          grep -q "Jane_3D_Mobile_APK_Model_B.glb" app/src/main/assets/index.html

          echo "=== removed-remnant verification ==="
          ! grep -R "BiometricPrompt\|DisabledBiometricPrompt\|USE_BIOMETRIC\|USE_FINGERPRINT\|fingerprint\|face verification\|confirmed user" app/src/main
          ! grep -R "jane_static_model_mobile_small.glb\|Meshy_AI_Kadi\|Meshy_AI_Midnight_Dragon_0512021503_texture.glb" app/src/main

          echo "=== retained feature verification ==="
          grep -q "Launch Jane" app/src/main/assets/index.html
          grep -q "jane_pdf_knowledge_library" app/src/main/assets/index.html
          grep -q "dialogText" app/src/main/assets/index.html
          grep -q "overflow:auto" app/src/main/assets/index.html

          sha=$(sha256sum "app/src/main/assets/Jane_3D_Mobile_APK_Model_B.glb" | awk '{print $1}')
          echo "Model B sha256: $sha"
          [ "$sha" = "c4cb2e997e6575c30b589f120517dedef70ef78fba5da6fc1c55b0761c84027a" ]

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: source
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JaneAI-debug-apk
          path: source/app/build/outputs/apk/debug/app-debug.apk
