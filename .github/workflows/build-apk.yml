name: Build Jane Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Unpack Jane package
        run: |
          rm -rf source unpacked
          mkdir -p unpacked

          if [ -f JaneAIAndroidSource_static_glb_home_v45_clean_base_texture.zip ]; then
            unzip JaneAIAndroidSource_static_glb_home_v45_clean_base_texture.zip -d source
          elif [ -f JaneStaticGLBHomeV45CleanBaseTexturePackage.zip ]; then
            unzip JaneStaticGLBHomeV45CleanBaseTexturePackage.zip -d unpacked
            unzip unpacked/JaneAIAndroidSource_static_glb_home_v45_clean_base_texture.zip -d source
          else
            ls -la
            exit 1
          fi

      - name: Verify V45 retained features and GLB
        working-directory: source
        run: |
          grep -q "applyV34DialogScrollFix" app/src/main/assets/index.html
          grep -q "Permanent imported knowledge library" app/src/main/assets/index.html
          grep -q "Launch Jane" app/src/main/assets/index.html
          grep -q "V45: same latest accepted app features" app/src/main/assets/index.html
          ! grep -q "janeSpeechWatchdog" app/src/main/assets/index.html
          sha=$(sha256sum app/src/main/assets/jane_static_model_mobile_small.glb | awk '{print $1}')
          [ "$sha" = "26228e4cf14667c29d2603c0154335afc686a5c57db04835cf9b6e8a5228ee81" ]

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: source
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JaneAI-debug-apk
          path: source/app/build/outputs/apk/debug/app-debug.apk
