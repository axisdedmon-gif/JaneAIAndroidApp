name: Build Jane Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Unpack Jane package
        run: |
          rm -rf source unpacked
          mkdir -p unpacked

          if [ -f JaneAIAndroidSource_static_glb_home_v47_new_dragon_model.zip ]; then
            unzip JaneAIAndroidSource_static_glb_home_v47_new_dragon_model.zip -d source
          elif [ -f JaneStaticGLBHomeV47NewDragonModelPackage.zip ]; then
            unzip JaneStaticGLBHomeV47NewDragonModelPackage.zip -d unpacked
            unzip unpacked/JaneAIAndroidSource_static_glb_home_v47_new_dragon_model.zip -d source
          else
            ls -la
            exit 1
          fi

      - name: Verify V47 retained features and new GLB
        working-directory: source
        run: |
          grep -q "applyV34DialogScrollFix" app/src/main/assets/index.html
          grep -q "Permanent imported knowledge library" app/src/main/assets/index.html
          grep -q "Launch Jane" app/src/main/assets/index.html
          grep -q "V47: same latest accepted app features" app/src/main/assets/index.html
          ! grep -q "janeSpeechWatchdog" app/src/main/assets/index.html
          sha=$(sha256sum app/src/main/assets/jane_static_model_mobile_small.glb | awk '{print $1}')
          [ "$sha" = "c4cb2e997e6575c30b589f120517dedef70ef78fba5da6fc1c55b0761c84027a" ]

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: source
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JaneAI-debug-apk
          path: source/app/build/outputs/apk/debug/app-debug.apk
