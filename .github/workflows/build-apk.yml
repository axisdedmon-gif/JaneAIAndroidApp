name: Build Jane Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Unpack Jane package
        run: |
          rm -rf source unpacked
          mkdir -p unpacked

          if [ -f JaneAIAndroidSource_static_glb_home_v32_voice_owner_fix.zip ]; then
            echo "Found source zip directly."
            unzip JaneAIAndroidSource_static_glb_home_v32_voice_owner_fix.zip -d source
          elif [ -f JaneStaticGLBHomeV32VoiceOwnerFixPackage.zip ]; then
            echo "Found outer package zip. Extracting inner source zip."
            unzip JaneStaticGLBHomeV32VoiceOwnerFixPackage.zip -d unpacked
            unzip unpacked/JaneAIAndroidSource_static_glb_home_v32_voice_owner_fix.zip -d source
          else
            echo "Could not find Jane source zip or outer package zip."
            echo "Files in repo root:"
            ls -la
            exit 1
          fi

      - name: Verify V32 voice and owner patch
        working-directory: source
        run: |
          grep -q "Jane is thinking" app/src/main/assets/index.html
          grep -q "revealTimer" app/src/main/assets/index.html
          grep -q "state.ownerVerified=true" app/src/main/assets/index.html
          grep -q "Launch Jane" app/src/main/assets/index.html

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: source
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JaneAI-debug-apk
          path: source/app/build/outputs/apk/debug/app-debug.apk
