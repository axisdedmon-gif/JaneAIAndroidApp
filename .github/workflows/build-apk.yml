name: Build Jane Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Unpack Jane V52 package
        run: |
          rm -rf source unpacked
          mkdir -p unpacked

          if [ -f JaneAIAndroidSource_v52_model_load_portal_effect.zip ]; then
            unzip JaneAIAndroidSource_v52_model_load_portal_effect.zip -d source
          elif [ -f JaneV52ModelLoadPortalEffectPackage.zip ]; then
            unzip JaneV52ModelLoadPortalEffectPackage.zip -d unpacked
            unzip unpacked/JaneAIAndroidSource_v52_model_load_portal_effect.zip -d source
          else
            echo "Package missing."
            ls -la
            exit 1
          fi

      - name: Verify V52 save point and model load patch
        working-directory: source
        run: |
          echo "=== model verification ==="
          find app/src/main/assets -name "*.glb" -print
          test "$(find app/src/main/assets -name "*.glb" | wc -l)" -eq 1
          test -f "app/src/main/assets/Jane_3D_Mobile_APK_Model_B.glb"
          grep -q "Jane_3D_Mobile_APK_Model_B.glb" app/src/main/assets/index.html
          ! grep -q "Jane_3D_Mobile_APK_Model_B.glb?v=" app/src/main/assets/index.html
          ! grep -R "data:model/gltf-binary;base64" app/src/main/assets/index.html
          ! grep -R "jane_static_model_mobile_small.glb\|Meshy_AI_Kadi\|Meshy_AI_Midnight_Dragon_0512021503_texture.glb" app/src/main

          echo "=== portal effect verification ==="
          test -f "app/src/main/assets/jane_hologram_portal_floor.gif"
          grep -q "janePortalFloor" app/src/main/assets/index.html
          grep -q "jane_hologram_portal_floor.gif" app/src/main/assets/index.html

          echo "=== removed biometric verification ==="
          ! grep -R "BiometricPrompt\|USE_BIOMETRIC\|USE_FINGERPRINT\|runOwnerBiometricCheck\|notifyOwnerCheckResult\|requestOwnerCheck\|Waiting for biometric check" app/src/main

          echo "=== retained feature verification ==="
          grep -q "Launch Jane" app/src/main/assets/index.html
          grep -q "applyV34DialogScrollFix" app/src/main/assets/index.html
          grep -q "JaneReceiveFile" app/src/main/assets/index.html
          grep -q "playAssetVoice" app/src/main/java/com/example/janeai/MainActivity.java

          sha=$(sha256sum "app/src/main/assets/Jane_3D_Mobile_APK_Model_B.glb" | awk '{print $1}')
          echo "Model B sha256: $sha"
          [ "$sha" = "c4cb2e997e6575c30b589f120517dedef70ef78fba5da6fc1c55b0761c84027a" ]

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: source
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JaneAI-debug-apk
          path: source/app/build/outputs/apk/debug/app-debug.apk
