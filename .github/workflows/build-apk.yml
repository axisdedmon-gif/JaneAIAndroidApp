name: Build Jane Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Unpack Jane package
        run: |
          rm -rf source unpacked
          mkdir -p unpacked

          if [ -f JaneAIAndroidSource_static_glb_home_v28_asset_voice_bridge_fix.zip ]; then
            echo "Found source zip directly."
            unzip JaneAIAndroidSource_static_glb_home_v28_asset_voice_bridge_fix.zip -d source
          elif [ -f Jane_V28B_asset_voice_bridge_verified.zip ]; then
            echo "Found outer verified package zip. Extracting inner source zip."
            unzip Jane_V28B_asset_voice_bridge_verified.zip -d unpacked
            unzip unpacked/JaneAIAndroidSource_static_glb_home_v28_asset_voice_bridge_fix.zip -d source
          elif [ -f JaneStaticGLBHomeV28AssetVoiceBridgeFixPackage.zip ]; then
            echo "Found outer package zip. Extracting inner source zip."
            unzip JaneStaticGLBHomeV28AssetVoiceBridgeFixPackage.zip -d unpacked
            unzip unpacked/JaneAIAndroidSource_static_glb_home_v28_asset_voice_bridge_fix.zip -d source
          else
            echo "Could not find Jane source zip or outer package zip."
            echo "Files in repo root:"
            ls -la
            exit 1
          fi

      - name: Restore generated startup voice cache
        uses: actions/cache@v4
        with:
          path: source/app/src/main/assets/startup_voice/*.mp3
          key: jane-startup-voice-v1-${{ secrets.ELEVENLABS_VOICE_ID }}
          restore-keys: |
            jane-startup-voice-v1-

      - name: Generate Jane startup voice assets
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL_ID: eleven_turbo_v2_5
          ELEVENLABS_OUTPUT_FORMAT: mp3_44100_128
        working-directory: source
        run: python3 scripts/generate_startup_voice_assets.py

      - name: Verify startup voice assets and bridge patch
        working-directory: source
        run: |
          count=$(find app/src/main/assets/startup_voice -name '*.mp3' | wc -l)
          echo "Startup MP3 count: $count"
          if [ "$count" -lt 80 ]; then
            echo "Expected 80 startup MP3 files."
            exit 1
          fi
          grep -q "MainActivity.this.playAssetVoice(assetPath)" app/src/main/java/com/example/janeai/MainActivity.java

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: source
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JaneAI-debug-apk
          path: source/app/build/outputs/apk/debug/app-debug.apk
